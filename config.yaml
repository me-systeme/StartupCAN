# -----------------------------------------------------------------------------
# DLL / CAN configuration
# -----------------------------------------------------------------------------
dll:
  # Maximum number of samples the DLL buffer stores per device read cycle.
  # This value is used to size read_multiple() calls and affects latency/throughput.
  mybuffersize: 300

  # CAN bus baud rate in bits per second.
  canbaud: 250000

devices:
  config:
    - dev_no: 1
      cmd_id: "0x100"
      answer_id: "0x201"
    - dev_no: 2
      cmd_id: "0x101"
      answer_id: "0x202"
    - dev_no: 3
      cmd_id: "0x102"
      answer_id: "0x203"
    - dev_no: 4
      cmd_id: "0x103"
      answer_id: "0x204"
    - dev_no: 5
      cmd_id: "0x104"
      answer_id: "0x205"
    - dev_no: 6
      cmd_id: "0x105"
      answer_id: "0x206"