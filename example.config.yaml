# -----------------------------------------------------------------------------
# StartupCAN configuration
# -----------------------------------------------------------------------------
# This file defines:
# - the default CAN settings used for default-mode activation/reset
# - the current device state (`devices.config.current`)
# - the target device state (`devices.config.new`)
# - the CAN baud rate used by the DLL during normal operation
#
# StartupCAN reads this file, validates it, performs the selected workflow,
# and then writes `config.updated.yaml` with the detected effective device state.
# -----------------------------------------------------------------------------


# -----------------------------------------------------------------------------
# DLL / CAN configuration
# -----------------------------------------------------------------------------
dll:
  # Maximum number of samples the DLL buffer stores per device read cycle.
  # This value is mainly relevant for applications that read measurement data.
  mybuffersize: 300

  # CAN bus baud rate in bits per second used as the normal runtime baud rate.
  # StartupCAN uses this as the target baud rate in normal reconfiguration modes
  # unless devices are explicitly reset to the default baud rate.
  canbaud: 250000


# -----------------------------------------------------------------------------
# Device configuration
# -----------------------------------------------------------------------------
devices:
  config:

    # -------------------------------------------------------------------------
    # Default CAN settings
    # -------------------------------------------------------------------------
    # These values define the shared default endpoint used by devices in
    # default mode and by forced-reset workflows.
    assign:
      # Default baud rate used when `current.default=true`
      # or when devices are reset back to default settings.
      default_canbaud: 1000000

      # Default CAN command ID used in default mode.
      default_cmd_id: "0x100"

      # Default CAN answer ID used in default mode.
      default_ans_id: "0x101"

    # -------------------------------------------------------------------------
    # Current device state
    # -------------------------------------------------------------------------
    current:
      # If true:
      # - StartupCAN ignores `current.ids`
      # - all devices are assumed to start with the shared default endpoint
      #
      # If false:
      # - StartupCAN uses `current.ids` as the current start state
      default: false
      ids:
        # ---------------------------------------------------------------------
        # Device 1
        # ---------------------------------------------------------------------
        - dev_no: 1

          # Optional serial number for identification and safety checks.
          # If present, StartupCAN can validate that the connected device
          # matches the expected physical unit.
          serial: 25455437

          # Optional current baud rate of this device.
          # If omitted, StartupCAN falls back to `dll.canbaud`.
          canbaud: 250000

          # Current command CAN ID of the device.
          cmd_id: '0x102'

          # Current answer CAN ID of the device.
          answer_id: '0x103'
        
        # ---------------------------------------------------------------------
        # Device 2
        # ---------------------------------------------------------------------
        - dev_no: 2
          canbaud: 1000000
          cmd_id: '0x100'
          answer_id: '0x101'
        
        # ---------------------------------------------------------------------
        # Device 3
        # ---------------------------------------------------------------------
        - dev_no: 3
          canbaud: 1000000
          cmd_id: '0x100'
          answer_id: '0x101'
    
    # -------------------------------------------------------------------------
    # Target device state
    # -------------------------------------------------------------------------
    new:
      # If true:
      # - StartupCAN ignores `new.ids`
      # - all devices are reset to the shared default endpoint
      #
      # If false:
      # - StartupCAN uses `new.ids` as the target configuration
      default: false

      ids:
        # ---------------------------------------------------------------------
        # Target settings for device 1
        # ---------------------------------------------------------------------
        - dev_no: 1

          # Optional serial number for serial mapping.
          serial: 25455437

          # Target command CAN ID of the device.
          cmd_id: "0x202"

          # Current answer CAN ID of the device.
          answer_id: "0x203"
        
        # ---------------------------------------------------------------------
        # Target settings for device 2
        # ---------------------------------------------------------------------
        - dev_no: 2
          serial: 25455423
          cmd_id: "0x204"
          answer_id: "0x205"
        
        # ---------------------------------------------------------------------
        # Target settings for device 3
        # ---------------------------------------------------------------------
        - dev_no: 3
          serial: 25455439
          cmd_id: "0x206"
          answer_id: "0x207"
