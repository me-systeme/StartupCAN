# -----------------------------------------------------------------------------
# DLL / CAN configuration
# -----------------------------------------------------------------------------
dll:
  # Maximum number of samples the DLL buffer stores per device read cycle.
  # This value is used to size read_multiple() calls and affects latency/throughput.
  mybuffersize: 300

  # CAN bus baud rate in bits per second.
  canbaud: 250000

devices:
  config:
    assign:
      default_cmd_id: "0x100"
      default_ans_id: "0x101"
    current:
      default: false
      ids:
        - dev_no: 1
          serial: 25455437
          cmd_id: '0x102'
          answer_id: '0x103'
        - dev_no: 2
          serial: 25455423
          cmd_id: '0x104'
          answer_id: '0x105'
        - dev_no: 3
          serial: 25455439
          cmd_id: '0x106'
          answer_id: '0x107'
    new:
      default: false
      ids: []
